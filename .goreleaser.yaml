version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
      - arm
    ldflags:
      - -s -w
      - -X github.com/babarot/afx/cmd.Version=v{{.Version}}
      - -X github.com/babarot/afx/cmd.BuildTag={{.Tag}}
      - -X github.com/babarot/afx/cmd.BuildSHA={{.ShortCommit}}
    main: .
    flags:
      - -trimpath

archives:
  - formats: ["tar.gz"]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: ["zip"]

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug Fixes
      regexp: "^fix"
      order: 1
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  prerelease: auto
  draft: false
  footer: >-
    ### Installation

    ```console
    $ go install github.com/babarot/afx@latest
    ```

    ---
    Generated by [GoReleaser](https://github.com/goreleaser/goreleaser).
